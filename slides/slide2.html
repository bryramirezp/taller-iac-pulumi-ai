<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 2: ¿Por qué te debería importar?</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        .slide-container {
            width: 100%;
            max-width: 1920px;
            aspect-ratio: 16 / 9;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
        }
        svg {
            width: 100%;
            height: 100%;
        }
        text {
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="slide-container">
    <svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
        <!-- Fondo -->
        <rect width="1920" height="1080" fill="#ffffff"/>

        <!-- ==================================================================
             ZONA TÍTULO
             ================================================================== -->
        <text x="960" y="120" fill="#000000" font-size="60" font-weight="bold" text-anchor="middle" letter-spacing="1">
            ¿Por qué te debería importar?
        </text>
        <text x="960" y="178" fill="#64748b" font-size="28" text-anchor="middle">
            Esto no es solo para ingenieros senior de DevOps.
        </text>

        <!-- ==================================================================
             GRID 2×2 — 4 tarjetas
             Columna izq: x=170      Columna der: x=990
             Fila arriba: y=260      Fila abajo:  y=540
             Cada tarjeta: 720w × 230h
             ================================================================== -->

        <!-- ============================================================
             TARJETA 1 — TU CARRERA (arriba-izquierda)
             ============================================================ -->
        <g transform="translate(170, 260)">
            <rect width="720" height="230" rx="16" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="2"/>

            <!-- Ícono: maletín en círculo -->
            <circle cx="100" cy="115" r="52" fill="#ffffff" stroke="#330066" stroke-width="3"/>
            <rect x="74" y="105" width="52" height="34" rx="4" fill="none" stroke="#330066" stroke-width="3.5"/>
            <path d="M88,105 V97 Q88,91 94,91 H106 Q112,91 112,97 V105" fill="none" stroke="#330066" stroke-width="3"/>
            <line x1="74" y1="121" x2="126" y2="121" stroke="#330066" stroke-width="2.5"/>

            <!-- Título + frase única -->
            <text x="180" y="95" fill="#330066" font-size="32" font-weight="bold">Tu Carrera</text>
            <text x="180" y="140" fill="#1a1a2e" font-size="24">Las empresas buscan quienes saben</text>
            <text x="180" y="172" fill="#1a1a2e" font-size="24"><tspan font-weight="bold" fill="#330066">desplegar</tspan>, no solo programar.</text>
        </g>

        <!-- ============================================================
             TARJETA 2 — TUS PROYECTOS (arriba-derecha)
             ============================================================ -->
        <g transform="translate(930, 260)">
            <rect width="720" height="230" rx="16" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="2"/>

            <!-- Ícono: cohete en círculo -->
            <circle cx="100" cy="115" r="52" fill="#ffffff" stroke="#330066" stroke-width="3"/>
            <path d="M100,83 L112,110 H88 Z" fill="#330066"/>
            <rect x="92" y="110" width="16" height="22" rx="3" fill="#330066"/>
            <path d="M95,132 L100,145 L105,132" fill="#38EF7D"/>
            <path d="M88,110 L80,125 L92,120" fill="#330066" opacity="0.6"/>
            <path d="M112,110 L120,125 L108,120" fill="#330066" opacity="0.6"/>

            <!-- Título + frase única -->
            <text x="180" y="95" fill="#330066" font-size="32" font-weight="bold">Tus Proyectos</text>
            <text x="180" y="140" fill="#1a1a2e" font-size="24">Tu portafolio o tu tesis, en internet</text>
            <text x="180" y="172" fill="#1a1a2e" font-size="24"><tspan font-weight="bold" fill="#330066">hoy</tspan>, gratis, con AWS Free Tier.</text>
        </g>

        <!-- ============================================================
             TARJETA 3 — TU DIFERENCIADOR (abajo-izquierda)
             ============================================================ -->
        <g transform="translate(170, 540)">
            <rect width="720" height="230" rx="16" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="2"/>

            <!-- Ícono: gráfica ascendente en círculo -->
            <circle cx="100" cy="115" r="52" fill="#ffffff" stroke="#330066" stroke-width="3"/>
            <rect x="76" y="123" width="12" height="20" rx="2" fill="#330066" opacity="0.4"/>
            <rect x="94" y="111" width="12" height="32" rx="2" fill="#330066" opacity="0.7"/>
            <rect x="112" y="95" width="12" height="48" rx="2" fill="#330066"/>
            <path d="M80,120 L118,90" fill="none" stroke="#38EF7D" stroke-width="3" stroke-linecap="round"/>
            <polygon points="115,83 124,88 116,95" fill="#38EF7D"/>

            <!-- Título + frase única -->
            <text x="180" y="95" fill="#330066" font-size="32" font-weight="bold">Tu Diferenciador</text>
            <text x="180" y="140" fill="#1a1a2e" font-size="24">Tus compañeros escriben código local.</text>
            <text x="180" y="172" fill="#1a1a2e" font-size="24">Tú vas a saber <tspan font-weight="bold" fill="#330066">ponerlo en producción.</tspan></text>
        </g>

        <!-- ============================================================
             TARJETA 4 — COSTO: $0 (abajo-derecha)
             ============================================================ -->
        <g transform="translate(930, 540)">
            <rect width="720" height="230" rx="16" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="2"/>

            <!-- Ícono: $0 en círculo -->
            <circle cx="100" cy="115" r="52" fill="#ffffff" stroke="#38EF7D" stroke-width="3"/>
            <text x="100" y="128" fill="#38EF7D" font-size="36" font-weight="bold" text-anchor="middle">$0</text>

            <!-- Título + frase única -->
            <text x="180" y="95" fill="#330066" font-size="32" font-weight="bold">Costo: $0</text>
            <text x="180" y="140" fill="#1a1a2e" font-size="24">Python + Pulumi + OpenCode + AWS Free Tier.</text>
            <text x="180" y="172" fill="#1a1a2e" font-size="24">Solo necesitas <tspan font-weight="bold" fill="#330066">curiosidad y 45 minutos.</tspan></text>
        </g>

        <!-- ==================================================================
             ZONA INFERIOR
             ================================================================== -->
        <text x="960" y="890" fill="#64748b" font-size="28" text-anchor="middle">
            Después de esta charla, vas a poder publicar un sitio web real en AWS.
            <tspan font-weight="bold" fill="#330066"> Solo con Python.</tspan>
        </text>

    </svg>
</div>

</body>
</html>
