<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 5: AI + IaC</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        .slide-container {
            width: 100%;
            max-width: 1920px;
            aspect-ratio: 16 / 9;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
        }
        svg {
            width: 100%;
            height: 100%;
        }
        text {
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="slide-container">
    <svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
        <!-- Fondo -->
        <rect width="1920" height="1080" fill="#ffffff"/>

        <!-- ==================================================================
             ZONA TÍTULO
             Jerarquía: título 60px bold negro → subtítulo 28px gris medio
             ================================================================== -->
        <text x="960" y="110" fill="#000000" font-size="60" font-weight="bold" text-anchor="middle" letter-spacing="1">
            Inteligencia Artificial + IaC
        </text>
        <text x="960" y="168" fill="#64748b" font-size="28" text-anchor="middle">
            Genera infraestructura desde lenguaje natural.
        </text>

        <!-- ==================================================================
             LÍNEA DE CONEXIÓN SUTIL (se oculta detrás de los bloques opacos,
             solo visible en los gaps entre columnas)
             ================================================================== -->
        <line x1="400" y1="490" x2="1520" y2="490" stroke="#330066" stroke-width="3" opacity="0.08"/>

        <!-- ==================================================================
             BLOQUE 1 — TU IDEA
             Grilla: x=170, y=240, 460×500
             Centro: cx=400
             ================================================================== -->
        <g transform="translate(170, 240)">
            <!-- Contenedor (estilo unificado: mismo en los 3 bloques) -->
            <rect width="460" height="500" rx="16" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="2"/>

            <!-- Ícono en círculo (r=58, stroke=#330066 3px — igual en los 3) -->
            <circle cx="230" cy="105" r="58" fill="#ffffff" stroke="#330066" stroke-width="3"/>
            <!-- Persona: cabeza + hombros -->
            <circle cx="230" cy="88" r="16" fill="#330066"/>
            <path d="M198,128 Q230,106 262,128" fill="none" stroke="#330066" stroke-width="7" stroke-linecap="round"/>

            <!-- Título del bloque (30px bold morado — igual en los 3) -->
            <text x="230" y="215" fill="#330066" font-size="30" font-weight="bold" text-anchor="middle">Tu Idea</text>

            <!-- Descripción (21px gris — igual en los 3) -->
            <text x="230" y="260" fill="#4a5568" font-size="21" text-anchor="middle">Describes lo que necesitas</text>
            <text x="230" y="288" fill="#4a5568" font-size="21" text-anchor="middle">en lenguaje natural.</text>

            <!-- Área de detalle: barra lateral + texto (mismo formato en los 3) -->
            <rect x="40" y="330" width="4" height="68" rx="2" fill="#330066"/>
            <text x="58" y="358" fill="#1a1a2e" font-size="19" font-style="italic">"Crea un bucket S3 público</text>
            <text x="58" y="385" fill="#1a1a2e" font-size="19" font-style="italic">y súbele este index.html"</text>
        </g>

        <!-- ==================================================================
             FLECHA 1 (gap entre bloque 1 y 2: x=630 a x=730)
             Estilo unificado: línea sólida + triángulo, verde #38EF7D
             ================================================================== -->
        <line x1="642" y1="490" x2="696" y2="490" stroke="#38EF7D" stroke-width="5" stroke-linecap="round"/>
        <polygon points="693,477 720,490 693,503" fill="#38EF7D"/>

        <!-- ==================================================================
             BLOQUE 2 — OPENCODE (IA)
             Grilla: x=730, y=240, 460×500
             Centro: cx=960
             ================================================================== -->
        <g transform="translate(730, 240)">
            <!-- Contenedor (mismo estilo) -->
            <rect width="460" height="500" rx="16" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="2"/>

            <!-- Ícono en círculo (mismas dimensiones) -->
            <circle cx="230" cy="105" r="58" fill="#ffffff" stroke="#330066" stroke-width="3"/>
            <!-- Red neuronal: 4 nodos + conexiones -->
            <circle cx="210" cy="82" r="9" fill="#330066"/>
            <circle cx="250" cy="88" r="9" fill="#330066"/>
            <circle cx="215" cy="122" r="9" fill="#330066"/>
            <circle cx="248" cy="118" r="9" fill="#330066"/>
            <line x1="210" y1="82" x2="250" y2="88" stroke="#330066" stroke-width="3"/>
            <line x1="250" y1="88" x2="248" y2="118" stroke="#330066" stroke-width="3"/>
            <line x1="215" y1="122" x2="210" y2="82" stroke="#330066" stroke-width="3"/>
            <line x1="215" y1="122" x2="248" y2="118" stroke="#330066" stroke-width="3"/>

            <!-- Título del bloque (mismo estilo) -->
            <text x="230" y="215" fill="#330066" font-size="30" font-weight="bold" text-anchor="middle">OpenCode (IA)</text>

            <!-- Descripción (mismo estilo) -->
            <text x="230" y="260" fill="#4a5568" font-size="21" text-anchor="middle">Interpreta tu intención,</text>
            <text x="230" y="288" fill="#4a5568" font-size="21" text-anchor="middle">genera código y lo aplica.</text>

            <!-- Área de detalle (misma barra lateral + texto) -->
            <rect x="40" y="330" width="4" height="68" rx="2" fill="#330066"/>
            <text x="58" y="358" fill="#1a1a2e" font-size="19">Interpreta → Genera → Valida</text>
            <text x="58" y="385" fill="#1a1a2e" font-size="19">Sin buscar documentación.</text>
        </g>

        <!-- ==================================================================
             FLECHA 2 (gap entre bloque 2 y 3: x=1190 a x=1290)
             Mismo estilo que flecha 1
             ================================================================== -->
        <line x1="1202" y1="490" x2="1256" y2="490" stroke="#38EF7D" stroke-width="5" stroke-linecap="round"/>
        <polygon points="1253,477 1280,490 1253,503" fill="#38EF7D"/>

        <!-- ==================================================================
             BLOQUE 3 — CÓDIGO LISTO
             Grilla: x=1290, y=240, 460×500
             Centro: cx=1520
             ================================================================== -->
        <g transform="translate(1290, 240)">
            <!-- Contenedor (mismo estilo) -->
            <rect width="460" height="500" rx="16" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="2"/>

            <!-- Ícono en círculo (mismas dimensiones) -->
            <circle cx="230" cy="105" r="58" fill="#ffffff" stroke="#330066" stroke-width="3"/>
            <!-- Código: </> -->
            <text x="230" y="118" fill="#330066" font-size="40" font-weight="bold" text-anchor="middle" font-family="'Courier New', monospace">&lt;/&gt;</text>

            <!-- Título del bloque (mismo estilo) -->
            <text x="230" y="215" fill="#330066" font-size="30" font-weight="bold" text-anchor="middle">Código Listo</text>

            <!-- Descripción (mismo estilo) -->
            <text x="230" y="260" fill="#4a5568" font-size="21" text-anchor="middle">Infraestructura definida</text>
            <text x="230" y="288" fill="#4a5568" font-size="21" text-anchor="middle">en Python, lista para desplegar.</text>

            <!-- Área de detalle (misma barra lateral + texto) -->
            <rect x="40" y="330" width="4" height="68" rx="2" fill="#330066"/>
            <text x="58" y="358" fill="#1a1a2e" font-size="19" font-family="'Courier New', monospace">pulumi up</text>
            <text x="58" y="385" fill="#1a1a2e" font-size="19">→ 7 recursos → URL pública</text>
        </g>

        <!-- ==================================================================
             ZONA INFERIOR (cierre)
             Texto plano integrado, sin cápsula ni contenedor separado.
             ================================================================== -->
        <text x="960" y="860" fill="#64748b" font-size="26" text-anchor="middle">
            La IA conoce la sintaxis. <tspan font-weight="bold" fill="#330066">Tú te enfocas en la arquitectura.</tspan>
        </text>

    </svg>
</div>

</body>
</html>
