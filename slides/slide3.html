<!DOCTYPE html>

    <title>Slide 3: ¿Por qué importa IaC? — ClickOps vs IaC</title>
    <style>
        body, html {

<div class="slide-container">

            ¿Por qué importa la Infraestructura como Código (IaC)?

        <!-- ==========================================

             ========================================== -->
        <g transform="translate(150, 220)">
            <!-- Fondo sutil de la columna -->
            <rect width="700" height="750" rx="20" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="2"/>
            
            <text x="350" y="60" fill="#330066" font-size="44" font-weight="bold" text-anchor="middle">ClickOps (El Caos Manual)</text>
            
            <!-- Ilustración de la consola (Dashboard complejo) -->
            <g transform="translate(150, 120)">
                <rect width="400" height="280" rx="12" fill="#ffffff" stroke="#330066" stroke-width="4"/>

                <line x1="20" y1="100" x2="70" y2="100" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>

                <rect x="120" y="210" width="20" height="20" fill="#e2e8f0" rx="4"/>
                <line x1="150" y1="220" x2="220" y2="220" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
                
                <!-- Cursor/Click -->
                <path d="M260,190 L280,230 L270,230 L280,250 L270,255 L260,235 L250,240 Z" fill="#000000"/>
            </g>

            <g transform="translate(60, 500)">

                <circle cx="20" cy="-10" r="8" fill="#ef4444"/>
                <text x="50" y="0" fill="#000000" font-size="32">Lento y tedioso</text>
                <!-- Punto 2 -->
                <circle cx="20" cy="50" r="8" fill="#ef4444"/>
                <text x="50" y="60" fill="#000000" font-size="32">Propenso a errores humanos</text>
                <!-- Punto 3 -->
                <circle cx="20" cy="110" r="8" fill="#ef4444"/>
                <text x="50" y="120" fill="#000000" font-size="32">Imposible de replicar exactamente</text>
                <!-- Punto 4 -->
                <circle cx="20" cy="170" r="8" fill="#ef4444"/>
                <text x="50" y="180" fill="#000000" font-size="32">¿Qué cambió ayer? (No hay historial)</text>
            </g>

        <!-- VS Círculo en el medio -->
        <circle cx="960" cy="595" r="50" fill="#330066"/>
        <text x="960" y="610" fill="#ffffff" font-size="40" font-weight="bold" text-anchor="middle">VS</text>

             ========================================== -->

            <!-- Fondo sutil de la columna -->

            <text x="350" y="60" fill="#330066" font-size="44" font-weight="bold" text-anchor="middle">IaC (La Solución Elegante)</text>

            <g transform="translate(150, 120)">

                <rect width="400" height="280" rx="12" fill="#1e1e1e" stroke="#330066" stroke-width="4"/> <!-- IDE oscuro para destacar código verde -->

                <circle cx="45" cy="25" r="6" fill="#eab308"/>
                <circle cx="65" cy="25" r="6" fill="#38EF7D"/>

                <text x="100" y="80" fill="#d4d4d4" font-size="20" font-family="monospace">pulumi</text>
                
                <!-- Definición de recurso -->
                <text x="20" y="120" fill="#d4d4d4" font-size="20" font-family="monospace">bucket = aws.s3.Bucket(</text>
                <text x="40" y="150" fill="#ce9178" font-size="20" font-family="monospace">"mi-sitio-web"</text><text x="210" y="150" fill="#d4d4d4" font-size="20" font-family="monospace">,</text>
                <text x="40" y="180" fill="#9cdcfe" font-size="20" font-family="monospace">website</text><text x="115" y="180" fill="#d4d4d4" font-size="20" font-family="monospace">={</text>
                <text x="60" y="210" fill="#9cdcfe" font-size="20" font-family="monospace">index_document:</text>
                <text x="230" y="210" fill="#ce9178" font-size="20" font-family="monospace">"index.html"</text>
                <text x="40" y="240" fill="#d4d4d4" font-size="20" font-family="monospace">}</text>
                <text x="20" y="270" fill="#d4d4d4" font-size="20" font-family="monospace">)</text>
            </g>

            <!-- Puntos de ventaja -->
            <g transform="translate(60, 500)">
                <!-- Punto 1 -->
                <circle cx="20" cy="-10" r="8" fill="#38EF7D"/>
                <text x="50" y="0" fill="#000000" font-size="32">Automatizado y veloz</text>
                <!-- Punto 2 -->
                <circle cx="20" cy="50" r="8" fill="#38EF7D"/>
                <text x="50" y="60" fill="#000000" font-size="32">Auditable (Guardado en Git)</text>
                <!-- Punto 3 -->
                <circle cx="20" cy="110" r="8" fill="#38EF7D"/>
                <text x="50" y="120" fill="#000000" font-size="32">100% Replicable en segundos</text>
                <!-- Punto 4 -->
                <circle cx="20" cy="170" r="8" fill="#38EF7D"/>
                <text x="50" y="180" fill="#000000" font-size="32">Se aplican las mejores prácticas de SW</text>

        <path d="M880,150 C960,150 960,150 1040,150" fill="none" stroke="#38EF7D" stroke-width="4" stroke-dasharray="10, 10"/>
