<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 6: Demo — Deploy en Vivo</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        .slide-container {
            width: 100%;
            max-width: 1920px;
            aspect-ratio: 16 / 9;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
        }
        svg {
            width: 100%;
            height: 100%;
        }
        text {
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="slide-container">
    <svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
        <!-- Fondo -->
        <rect width="1920" height="1080" fill="#ffffff"/>

        <!-- ==================================================================
             ZONA TÍTULO
             ================================================================== -->
        <text x="960" y="100" fill="#000000" font-size="56" font-weight="bold" text-anchor="middle" letter-spacing="1">
            Demo: Sitio Web en S3
        </text>
        <text x="960" y="152" fill="#64748b" font-size="26" text-anchor="middle">
            De código Python a un sitio web público en ~60 segundos.
        </text>

        <!-- ==================================================================
             PIPELINE HORIZONTAL — 4 nodos conectados
             Nodo 1: x=160  (centro 280)
             Nodo 2: x=545  (centro 665)
             Nodo 3: x=1135 (centro 1255)
             Nodo 4: x=1520 (centro 1640)
             Cada nodo: 240w × 130h, rx=14
             ================================================================== -->

        <!-- Línea de conexión de fondo (sutil, detrás de todo) -->
        <line x1="280" y1="280" x2="1640" y2="280" stroke="#330066" stroke-width="2" opacity="0.06"/>

        <!-- NODO 1 — __main__.py -->
        <g>
            <rect x="160" y="215" width="240" height="130" rx="14" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="2"/>
            <text x="280" y="268" fill="#330066" font-size="18" font-weight="bold" text-anchor="middle" font-family="'Courier New', monospace">__main__.py</text>
            <text x="280" y="322" fill="#64748b" font-size="16" text-anchor="middle">Tu código Python</text>
        </g>

        <!-- FLECHA 1 -->
        <line x1="412" y1="280" x2="530" y2="280" stroke="#38EF7D" stroke-width="4" stroke-linecap="round"/>
        <polygon points="527,269 548,280 527,291" fill="#38EF7D"/>

        <!-- NODO 2 — pulumi up -->
        <g>
            <rect x="545" y="215" width="240" height="130" rx="14" fill="#330066" stroke="#330066" stroke-width="2"/>
            <text x="665" y="268" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle" font-family="'Courier New', monospace">pulumi up</text>
            <text x="665" y="322" fill="rgba(255,255,255,0.7)" font-size="16" text-anchor="middle">Ejecuta el deploy</text>
        </g>

        <!-- FLECHA 2 -->
        <line x1="797" y1="280" x2="1120" y2="280" stroke="#38EF7D" stroke-width="4" stroke-linecap="round"/>
        <polygon points="1117,269 1138,280 1117,291" fill="#38EF7D"/>

        <!-- Texto sobre flecha larga: "Crea 7 recursos" -->
        <text x="958" y="265" fill="#38EF7D" font-size="15" font-weight="bold" text-anchor="middle">Crea 7 recursos</text>

        <!-- NODO 3 — AWS S3 -->
        <g>
            <rect x="1135" y="215" width="240" height="130" rx="14" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="2"/>
            <text x="1255" y="268" fill="#330066" font-size="22" font-weight="bold" text-anchor="middle">AWS S3</text>
            <text x="1255" y="322" fill="#64748b" font-size="16" text-anchor="middle">Bucket + Website</text>
        </g>

        <!-- FLECHA 3 -->
        <line x1="1387" y1="280" x2="1505" y2="280" stroke="#38EF7D" stroke-width="4" stroke-linecap="round"/>
        <polygon points="1502,269 1523,280 1502,291" fill="#38EF7D"/>

        <!-- NODO 4 — URL pública -->
        <g>
            <rect x="1520" y="215" width="240" height="130" rx="14" fill="#f8f9fa" stroke="#38EF7D" stroke-width="3"/>
            <text x="1640" y="268" fill="#000000" font-size="20" font-weight="bold" text-anchor="middle">URL Pública</text>
            <text x="1640" y="322" fill="#64748b" font-size="16" text-anchor="middle">Visible en el browser</text>
        </g>

        <!-- ==================================================================
             BLOQUE CENTRAL — Preview de código
             Simula una ventana de terminal/editor
             x=160, y=400, 1160w × 370h
             ================================================================== -->
        <g transform="translate(160, 400)">
            <!-- Fondo oscuro tipo editor -->
            <rect width="1160" height="370" rx="12" fill="#1a1a2e"/>

            <!-- Barra de título del editor -->
            <rect width="1160" height="40" rx="12" fill="#12121f"/>
            <rect y="28" width="1160" height="12" fill="#12121f"/>
            <!-- Dots -->
            <circle cx="24" cy="20" r="6" fill="#ff5f56"/>
            <circle cx="46" cy="20" r="6" fill="#ffbd2e"/>
            <circle cx="68" cy="20" r="6" fill="#27c93f"/>
            <text x="580" y="26" fill="#64748b" font-size="13" text-anchor="middle" font-family="'Courier New', monospace">__main__.py (preview)</text>

            <!-- Líneas de código (simplificadas, representativas) -->
            <text x="30" y="80" fill="#64748b" font-size="17" font-family="'Courier New', monospace">
                <tspan fill="#636e88">  1</tspan><tspan fill="#c792ea">  import </tspan><tspan fill="#82aaff">pulumi</tspan>
            </text>
            <text x="30" y="108" fill="#64748b" font-size="17" font-family="'Courier New', monospace">
                <tspan fill="#636e88">  2</tspan><tspan fill="#c792ea">  import </tspan><tspan fill="#82aaff">pulumi_aws </tspan><tspan fill="#c792ea">as </tspan><tspan fill="#82aaff">aws</tspan>
            </text>

            <text x="30" y="148" fill="#636e88" font-size="17" font-family="'Courier New', monospace">
                <tspan>  4</tspan><tspan fill="#546e7a">  # 1. Crear el bucket S3</tspan>
            </text>
            <text x="30" y="176" fill="#64748b" font-size="17" font-family="'Courier New', monospace">
                <tspan fill="#636e88">  5</tspan><tspan fill="#eeffff">  bucket = </tspan><tspan fill="#82aaff">aws.s3.BucketV2</tspan><tspan fill="#89ddff">(</tspan><tspan fill="#c3e88d">"mi-bucket"</tspan><tspan fill="#89ddff">)</tspan>
            </text>

            <text x="30" y="216" fill="#636e88" font-size="17" font-family="'Courier New', monospace">
                <tspan> 12</tspan><tspan fill="#546e7a">  # 5. Habilitar website hosting</tspan>
            </text>
            <text x="30" y="244" fill="#64748b" font-size="17" font-family="'Courier New', monospace">
                <tspan fill="#636e88"> 13</tspan><tspan fill="#eeffff">  website = </tspan><tspan fill="#82aaff">aws.s3.BucketWebsiteConfigurationV2</tspan><tspan fill="#89ddff">(</tspan><tspan fill="#c3e88d">...</tspan><tspan fill="#89ddff">)</tspan>
            </text>

            <text x="30" y="284" fill="#636e88" font-size="17" font-family="'Courier New', monospace">
                <tspan> 18</tspan><tspan fill="#546e7a">  # 6. Subir index.html</tspan>
            </text>
            <text x="30" y="312" fill="#64748b" font-size="17" font-family="'Courier New', monospace">
                <tspan fill="#636e88"> 19</tspan><tspan fill="#eeffff">  index = </tspan><tspan fill="#82aaff">aws.s3.BucketObject</tspan><tspan fill="#89ddff">(</tspan><tspan fill="#c3e88d">"index.html"</tspan><tspan fill="#89ddff">, </tspan><tspan fill="#f78c6c">source</tspan><tspan fill="#89ddff">=</tspan><tspan fill="#82aaff">FileAsset</tspan><tspan fill="#89ddff">(</tspan><tspan fill="#c3e88d">"website/index.html"</tspan><tspan fill="#89ddff">))</tspan>
            </text>

            <text x="30" y="352" fill="#636e88" font-size="17" font-family="'Courier New', monospace">
                <tspan> 24</tspan><tspan fill="#82aaff">  pulumi</tspan><tspan fill="#89ddff">.</tspan><tspan fill="#82aaff">export</tspan><tspan fill="#89ddff">(</tspan><tspan fill="#c3e88d">"website_url"</tspan><tspan fill="#89ddff">, </tspan><tspan fill="#eeffff">website_url</tspan><tspan fill="#89ddff">)</tspan>
            </text>
        </g>

        <!-- ==================================================================
             PANEL DERECHO — 3 Stats apilados verticalmente
             x=1400, y=400, 360w × 370h
             ================================================================== -->
        <g transform="translate(1400, 400)">
            <rect width="360" height="370" rx="12" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="2"/>

            <!-- Título del panel -->
            <text x="180" y="45" fill="#000000" font-size="22" font-weight="bold" text-anchor="middle">Lo que va a pasar</text>
            <line x1="40" y1="65" x2="320" y2="65" stroke="#e2e8f0" stroke-width="1.5"/>

            <!-- Stat 1 — 7 recursos -->
            <g transform="translate(0, 85)">
                <circle cx="60" cy="30" r="26" fill="#ffffff" stroke="#330066" stroke-width="2.5"/>
                <text x="60" y="37" fill="#330066" font-size="22" font-weight="bold" text-anchor="middle">7</text>
                <text x="105" y="27" fill="#000000" font-size="20" font-weight="bold">Recursos AWS</text>
                <text x="105" y="50" fill="#64748b" font-size="15">Bucket, ACL, Policy, Website...</text>
            </g>

            <!-- Stat 2 — 1 comando -->
            <g transform="translate(0, 180)">
                <circle cx="60" cy="30" r="26" fill="#ffffff" stroke="#330066" stroke-width="2.5"/>
                <text x="60" y="37" fill="#330066" font-size="22" font-weight="bold" text-anchor="middle">1</text>
                <text x="105" y="27" fill="#000000" font-size="20" font-weight="bold">Comando</text>
                <text x="105" y="50" fill="#64748b" font-size="15" font-family="'Courier New', monospace">pulumi up</text>
            </g>

            <!-- Stat 3 — ~60 segundos -->
            <g transform="translate(0, 275)">
                <circle cx="60" cy="30" r="26" fill="#ffffff" stroke="#38EF7D" stroke-width="2.5"/>
                <text x="60" y="37" fill="#38EF7D" font-size="18" font-weight="bold" text-anchor="middle">~60</text>
                <text x="105" y="27" fill="#000000" font-size="20" font-weight="bold">Segundos</text>
                <text x="105" y="50" fill="#64748b" font-size="15">Deploy completo en AWS</text>
            </g>
        </g>

        <!-- ==================================================================
             ZONA INFERIOR
             ================================================================== -->
        <text x="960" y="870" fill="#64748b" font-size="26" text-anchor="middle">
            Todo desde la terminal. <tspan font-weight="bold" fill="#330066">Sin tocar la consola de AWS.</tspan>
        </text>

        <!-- ==================================================================
             DIAGRAMA SIMPLIFICADO DE RESULTADO
             Browser → URL → S3 → index.html (pequeño, debajo de la frase)
             ================================================================== -->
        <g transform="translate(580, 910)">
            <!-- Browser -->
            <rect x="0" y="0" width="100" height="40" rx="8" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="1.5"/>
            <text x="50" y="26" fill="#64748b" font-size="14" text-anchor="middle">Browser</text>

            <line x1="108" y1="20" x2="150" y2="20" stroke="#e2e8f0" stroke-width="2"/>
            <polygon points="148,14 160,20 148,26" fill="#e2e8f0"/>

            <!-- URL -->
            <rect x="160" y="0" width="160" height="40" rx="8" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="1.5"/>
            <text x="240" y="26" fill="#64748b" font-size="13" text-anchor="middle" font-family="'Courier New', monospace">http://...s3.aws</text>

            <line x1="328" y1="20" x2="370" y2="20" stroke="#e2e8f0" stroke-width="2"/>
            <polygon points="368,14 380,20 368,26" fill="#e2e8f0"/>

            <!-- S3 -->
            <rect x="380" y="0" width="100" height="40" rx="8" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="1.5"/>
            <text x="430" y="26" fill="#64748b" font-size="14" text-anchor="middle">S3 Bucket</text>

            <line x1="488" y1="20" x2="530" y2="20" stroke="#e2e8f0" stroke-width="2"/>
            <polygon points="528,14 540,20 528,26" fill="#e2e8f0"/>

            <!-- index.html -->
            <rect x="540" y="0" width="120" height="40" rx="8" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="1.5"/>
            <text x="600" y="26" fill="#64748b" font-size="13" text-anchor="middle" font-family="'Courier New', monospace">index.html</text>
        </g>

    </svg>
</div>

</body>
</html>
