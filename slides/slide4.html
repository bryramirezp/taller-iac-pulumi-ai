<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 4: ¿Qué es Pulumi?</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        .slide-container {
            width: 100%;
            max-width: 1920px;
            aspect-ratio: 16 / 9;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
        }
        svg {
            width: 100%;
            height: 100%;
        }
        text {
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="slide-container">
    <svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
        <!-- Fondo -->
        <rect width="1920" height="1080" fill="#ffffff"/>

        <!-- Título principal -->
        <text x="960" y="140" fill="#000000" font-size="64" font-weight="bold" text-anchor="middle" letter-spacing="1">
            ¿Qué es Pulumi?
        </text>
        <text x="960" y="200" fill="#000000" font-size="32" text-anchor="middle">
            Infraestructura como Código usando lenguajes que <tspan font-weight="bold" fill="#330066">ya conoces</tspan>.
        </text>

        <!-- ==========================================
             PASO 1: LENGUAJES (Izquierda)
             ========================================== -->
        <g transform="translate(150, 350)">
            <rect width="400" height="400" rx="16" fill="#f8f9fa" stroke="#330066" stroke-width="4"/>
            <text x="200" y="70" fill="#330066" font-size="36" font-weight="bold" text-anchor="middle">1. Tu Código</text>
            
            <!-- Espacio vacío reservado para que insertes imágenes (Logos de lenguajes) -->
            <!-- Área sugerida: x="50" y="100" width="300" height="240" -->

            <!-- Descripción -->
            <text x="200" y="460" fill="#000000" font-size="26" text-anchor="middle">No tienes que aprender un</text>
            <text x="200" y="500" fill="#000000" font-size="26" text-anchor="middle">lenguaje inventado nuevo.</text>
        </g>

        <!-- FLECHA 1 -->
        <g transform="translate(600, 530)">
            <path d="M0,0 L110,0" fill="none" stroke="#38EF7D" stroke-width="12" stroke-linecap="round"/>
            <polygon points="100,-15 130,0 100,15" fill="#38EF7D"/>
        </g>

        <!-- ==========================================
             PASO 2: EL MOTOR PULUMI (Centro)
             ========================================== -->
        <g transform="translate(760, 350)">
            <rect width="400" height="400" rx="16" fill="#f8f9fa" stroke="#330066" stroke-width="4"/>
            <text x="200" y="70" fill="#330066" font-size="36" font-weight="bold" text-anchor="middle">2. Motor Pulumi</text>
            
            <!-- Espacio vacío reservado para que insertes imágenes (Logo de Pulumi / Engranajes) -->
            <!-- Área sugerida: cx="200" cy="220" r="100" -->

            <!-- Descripción -->
            <text x="200" y="460" fill="#000000" font-size="26" text-anchor="middle">Calcula exactamente qué crear,</text>
            <text x="200" y="500" fill="#000000" font-size="26" text-anchor="middle">actualizar o borrar (El "Plan").</text>
        </g>

        <!-- FLECHA 2 -->
        <g transform="translate(1210, 530)">
            <path d="M0,0 L110,0" fill="none" stroke="#38EF7D" stroke-width="12" stroke-linecap="round"/>
            <polygon points="100,-15 130,0 100,15" fill="#38EF7D"/>
        </g>

        <!-- ==========================================
             PASO 3: LA NUBE (Derecha)
             ========================================== -->
        <g transform="translate(1370, 350)">
            <rect width="400" height="400" rx="16" fill="#f8f9fa" stroke="#330066" stroke-width="4"/>
            <text x="200" y="70" fill="#330066" font-size="36" font-weight="bold" text-anchor="middle">3. La Nube</text>
            
            <!-- Espacio vacío reservado para que insertes imágenes (Logos de AWS, Azure, GCP) -->
            <!-- Área sugerida: cx="200" cy="220" r="100" -->

            <!-- Descripción -->
            <text x="200" y="460" fill="#000000" font-size="26" text-anchor="middle">Llama a las APIs y despliega</text>
            <text x="200" y="500" fill="#000000" font-size="26" text-anchor="middle">la infraestructura real.</text>
        </g>

        <!-- Detalle de comando en el centro -->
        <!-- (Sección completamente eliminada para mayor limpieza) -->

    </svg>
</div>

</body>
</html>
