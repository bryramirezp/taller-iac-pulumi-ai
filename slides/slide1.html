<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide: ¿Qué es Infraestructura?</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* Fondo blanco para contrastar con el texto negro */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        .slide-container {
            width: 100%;
            max-width: 1920px;
            aspect-ratio: 16 / 9;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
        }
        svg {
            width: 100%;
            height: 100%;
        }
        a {
            text-decoration: underline;
        }
        /* Ningún otro elemento debe estar subrayado */
        text {
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="slide-container">
    <svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
        <!-- Fondo -->
        <rect width="1920" height="1080" fill="#ffffff"/>

        <!-- Título principal (#000000) -->
        <text x="960" y="90" fill="#000000" font-size="64" font-weight="bold" text-anchor="middle" letter-spacing="1">
            ¿Qué es la Infraestructura Tecnológica?
        </text>

        <!-- ==========================================
             LÍNEA DIVISORIA (Énfasis #330066)
             ========================================== -->
        <line x1="150" y1="450" x2="1770" y2="450" stroke="#330066" stroke-width="4" stroke-dasharray="15, 10" opacity="0.6"/>
        
        <text x="1750" y="425" fill="#330066" font-size="22" text-anchor="end" font-weight="bold">LO QUE EL USUARIO VE (El Producto)</text>
        <text x="1750" y="485" fill="#330066" font-size="22" text-anchor="end" font-weight="bold">LO QUE SOSTIENE EL NEGOCIO (La Infraestructura)</text>

        <!-- ==========================================
             ILUSTRACIÓN (Izquierda)
             ========================================== -->
        
        <!-- ARRIBA: El Producto -->
        <g transform="translate(350, 200)">
            <!-- Monitor/App -->
            <rect width="360" height="220" rx="16" fill="#f0f0f0" stroke="#330066" stroke-width="4"/>
            <!-- UI Header -->
            <circle cx="40" cy="40" r="12" fill="#ef4444"/>
            <circle cx="75" cy="40" r="12" fill="#eab308"/>
            <circle cx="110" cy="40" r="12" fill="#38EF7D"/> <!-- Verde para acento de código/tech -->
            <rect x="40" y="80" width="280" height="20" rx="10" fill="#cccccc"/>
            <rect x="40" y="120" width="280" height="60" rx="10" fill="#cccccc"/>
            
            <text x="180" y="-30" fill="#000000" font-size="32" font-weight="bold" text-anchor="middle">Sitio Web / App Móvil</text>
        </g>

        <!-- CONEXIÓN -->
        <!-- Líneas de datos fluyendo (Énfasis #330066) -->
        <path d="M530,420 L530,520" stroke="#330066" stroke-width="8" stroke-dasharray="20, 10" fill="none"/>
        <path d="M480,420 L480,520" stroke="#330066" stroke-width="4" stroke-dasharray="10, 10" fill="none" opacity="0.5"/>
        <path d="M580,420 L580,520" stroke="#330066" stroke-width="4" stroke-dasharray="10, 10" fill="none" opacity="0.5"/>

        <!-- ABAJO: La Infraestructura -->
        <g transform="translate(350, 520)">
            <rect width="360" height="360" rx="16" fill="#f8f9fa" stroke="#330066" stroke-width="4"/>
            <!-- Servers / Racks -->
            <rect x="40" y="40" width="280" height="50" rx="8" fill="#ffffff" stroke="#330066" stroke-width="2"/>
            <circle cx="70" cy="65" r="8" fill="#38EF7D"/> <!-- Verde código/OK -->
            <circle cx="100" cy="65" r="8" fill="#38EF7D"/>
            
            <rect x="40" y="110" width="280" height="50" rx="8" fill="#ffffff" stroke="#330066" stroke-width="2"/>
            <circle cx="70" cy="135" r="8" fill="#38EF7D"/>
            <circle cx="100" cy="135" r="8" fill="#38EF7D"/>
            
            <rect x="40" y="180" width="280" height="50" rx="8" fill="#ffffff" stroke="#330066" stroke-width="2"/>
            <circle cx="70" cy="205" r="8" fill="#38EF7D"/>
            <circle cx="100" cy="205" r="8" fill="#330066"/> <!-- Falla conceptual en morado oscuro o gris -->

            <!-- DB Icon -->
            <ellipse cx="180" cy="280" rx="60" ry="20" fill="none" stroke="#330066" stroke-width="3"/>
            <path d="M120,280 V310 C120,325 180,335 180,335 C180,335 240,325 240,310 V280" fill="none" stroke="#330066" stroke-width="3"/>
            
            <!-- Acento verde de código en la DB -->
            <text x="180" y="315" fill="#38EF7D" font-size="14" font-family="monospace" text-anchor="middle">&lt;data&gt;</text>
            
            <text x="180" y="420" fill="#000000" font-size="32" font-weight="bold" text-anchor="middle">Servidores, Redes, Bases de Datos</text>
        </g>

        <!-- ==========================================
             TEXTOS CONCEPTUALES (Derecha)
             ========================================== -->
        
        <!-- Punto 1: La capa invisible -->
        <g transform="translate(900, 240)">
            <!-- Icono Alert/Invisible en morado (énfasis) -->
            <rect x="0" y="-35" width="4" height="40" fill="#330066" rx="2"/>
            <text x="40" y="0" fill="#330066" font-size="44" font-weight="bold">La Capa Invisible</text>
            <text x="40" y="60" fill="#000000" font-size="32">Nadie se da cuenta de que existe...</text>
            <text x="40" y="110" fill="#000000" font-size="32">hasta que el sistema falla y se cae la app.</text>
        </g>

        <!-- Punto 2: Habilitador de negocio -->
        <g transform="translate(900, 650)">
            <!-- Icono Rocket/Business en verde -->
            <rect x="0" y="-35" width="4" height="40" fill="#38EF7D" rx="2"/>
            <text x="40" y="0" fill="#330066" font-size="44" font-weight="bold">El Habilitador del Negocio</text>
            <text x="40" y="60" fill="#000000" font-size="32">En la era de las telecomunicaciones, es el motor</text>
            <text x="40" y="110" fill="#000000" font-size="32">que permite operar, procesar pagos, conectar</text>
            <text x="40" y="160" fill="#000000" font-size="32">usuarios y escalar a nivel global.</text>
        </g>

    </svg>
</div>

</body>
</html>
